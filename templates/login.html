<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Ynov Community</title>
    <link rel="stylesheet" href="../static/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <a href="index.html" class="login-logo">YNOV<span>COMMUNITY</span></a>
                <h1>Ravi de vous revoir</h1>
                <p>Connectez-vous pour accéder à votre espace.</p>
            </div>

            <form title="Formulaire de connexion">
                <div class="input-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" placeholder="nom@exemple.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye" id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login">Se connecter</button>
            </form>

            <div class="login-footer">
                <p>Pas encore de compte ? <a href="inscription.html">Créer un compte</a></p>
            </div>
        </div>
    </div>

    <script src="../static/js/mdp.js"></script>

</body>
</html>
