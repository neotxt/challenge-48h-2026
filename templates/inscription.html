<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Ynov Community</title>
    <link rel="stylesheet" href="../static/css/inscription.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap">
</head>
<body>
<div class="registration-container">
    <div class="auth-box">
        <div class="auth-header">
            <a href="index.html" class="logo">YNOV<span>COMMUNITY</span></a>
            <h1>Créer un compte</h1>
            <p>Rejoignez la plateforme étudiante.</p>
        </div>

        <form>
            <div class="input-row">
                <div class="input-group">
                    <label>Prénom</label>
                    <input type="text" placeholder="Jean" required>
                </div>
                <div class="input-group">
                    <label>Nom</label>
                    <input type="text" placeholder="Dupont" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Ynov</label>
                <input type="email" placeholder="prenom.nom@ynov.com" required>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">S'inscrire</button>
        </form>

        <div class="auth-footer">
            <p>Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>
</div>

</body>
</html>
