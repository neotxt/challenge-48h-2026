<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Test API POO</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .user-item {
            background: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #eee;
        }

        button {
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>

<body>

    <h1>Ma console de test</h1>

    <section>
        <h3>Ajouter un utilisateur</h3>
        <input type="text" id="newName" placeholder="Nom">
        <input type="email" id="newEmail" placeholder="Email">
        <button onclick="addUser()">Envoyer (POST)</button>
    </section>

    <section>
        <h3>Utilisateurs en base <button onclick="loadUsers()">Rafraîchir (GET)</button></h3>
        <div id="userList">Cliquez sur rafraîchir...</div>
    </section>

    <script>
        const API_URL = 'http://localhost:3000/users';

        // 1. GET - Récupérer tous les utilisateurs
        async function loadUsers() {
            const res = await fetch(API_URL);
            const users = await res.json();
            const container = document.getElementById('userList');

            container.innerHTML = users.length === 0 ? "Aucun utilisateur." : "";

            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <strong>ID ${u.id}:</strong> ${u.name} (${u.email})
                    <button onclick="updateUser(${u.id})">Modifier Nom (PUT)</button>
                    <button onclick="deleteUser(${u.id})" style="color:red">Supprimer (DELETE)</button>
                `;
                container.appendChild(div);
            });
        }

        // 2. POST - Créer un utilisateur
        async function addUser() {
            const name = document.getElementById('newName').value;
            const email = document.getElementById('newEmail').value;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password: '123', role: 'etudiant' })
            });

            loadUsers();
        }

        // 3. DELETE - Supprimer un utilisateur
        async function deleteUser(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadUsers();
        }

        // 4. PUT - Modifier (On change juste le nom pour le test)
        async function updateUser(id) {
            const newName = prompt("Nouveau nom :");
            if (!newName) return;

            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName })
            });
            loadUsers();
        }

        // Chargement initial
        loadUsers();
    </script>
</body>

</html>
