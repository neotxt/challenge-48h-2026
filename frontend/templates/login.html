<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Ynov Community</title>
    <link rel="stylesheet" href="../static/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <a href="index.html" class="login-logo">YNOV<span>COMMUNITY</span></a>
                <h1>Ravi de vous revoir</h1>
                <p>Connectez-vous pour accéder à votre espace.</p>
            </div>

            <!-- Ajout de l'id pour le script JS -->
            <form id="loginForm" action="feed.html">
                <div class="input-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" name="email" placeholder="nom@exemple.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye" id="togglePassword" style="cursor: pointer;"></i>
                    </div>
                    <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-login">Se connecter</button>
            </form>

            <div class="login-footer">
                <p>Pas encore de compte ? <a href="inscription.html">Créer un compte</a></p>
            </div>
        </div>
    </div>

    <script>
        // 1. Gestion de la visibilité du mot de passe
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // 2. Gestion de la connexion et redirection
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Bloque le rechargement de la page

            // On récupère l'email et le mot de passe tapés
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // 1. On récupère la réponse complète du serveur (qui contient l'objet user)
                    const responseData = await response.json();

                    // 2. On sauvegarde l'utilisateur dans la mémoire du navigateur
                    localStorage.setItem('currentUser', JSON.stringify(responseData.user));

                    // 3. On redirige vers le feed
                    window.location.href = 'feed.html';
                } else {
                    const errorData = await response.json();
                    alert("Erreur : " + errorData.error);
                }
            } catch (error) {
                console.error("Erreur serveur :", error);
                alert("Impossible de contacter le serveur.");
            }
        });
    </script>

</body>

</html>
